server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: user-service
  data:
    mongodb:
      auto-index-creation: true
      uri: ${MONGODB_URI:mongodb://user_service:user_1234321@localhost:27020}
      database: ${MONGODB_DATABASE:user-db}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:9091/eureka}

springdoc:
  swagger-ui:
    enabled: false

management:
  tracing:
    enabled: true
    propagation:
      produce: b3
      consume: b3
    sampling:
      probability: 1.0
    export:
      zipkin:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, metrics
