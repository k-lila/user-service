version: "3.9"

services:
  user-mongo:
    image: mongo:8.2
    container_name: user-db
    ports:
      - "27020:27017"
    volumes:
      - user_db_data:/data/db
    networks:
      - users-net
    environment:
      MONGO_INITDB_ROOT_USERNAME: user_service
      MONGO_INITDB_ROOT_PASSWORD: user_1234321

networks:
  users-net:
    name: users-net
    driver: bridge

volumes:
  user_db_data:
    name: user_db_data
